[profile.default]
solc = '0.8.26'
via_ir = true
evm_version = 'paris'
src = 'src'
test = 'test'
libs = ['lib', 'node_modules']
out = 'out'
optimizer = true
optimizer_runs = 200
auto_detect_solc = false
bytecode_hash = "none"
auto_detect_remappings = false
fs_permissions = [
  { access = "read", path = "./out-optimized" },
  { access = "read", path = "./test/bin" },
]

[fuzz]
runs = 500

[invariant]
runs = 500
fail_on_revert = true
depth = 10

[profile.optimized-build]
deny_warnings = true
via_ir = true
test = 'src'
optimizer_runs = 50000
out = 'out-optimized'
cache_path = 'cache-optimized'

[profile.optimized-build-standalone]
deny_warnings = true
via_ir = true
test = 'src'
optimizer_runs = 10000000
out = 'out-optimized-standalone'
cache_path = 'cache-optimized-standalone'

[profile.optimized-build-sma-storage]
deny_warnings = true
via_ir = true
test = 'src'
optimizer_runs = 15000
out = 'out-optimized-sma-storage'
cache_path = 'cache-optimized-sma-storage'

[profile.optimized-test]
deny_warnings = true
src = 'test'

[profile.optimized-test-deep]
deny_warnings = true
src = 'test'

[profile.optimized-test-deep.fuzz]
runs = 10000

[profile.optimized-test-deep.invariant]
runs = 5000
depth = 32

[profile.deep.fuzz]
runs = 100000

[profile.deep.invariant]
runs = 5000
depth = 32

[profile.gas]
via_ir = true
deny_warnings = true
test = 'gas'
optimizer_runs = 50000
out = 'out-optimized'
cache_path = 'cache-optimized'
snapshots = 'gas-snapshots'
ffi = true
isolate = true

[fmt]
line_length = 115
wrap_comments = true
sort_imports = true
number_underscore = "thousands"
int_types = "long"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[rpc_endpoints]
local = "http://localhost:8545" # Or your tea-geth RPC URL
tea = "https://tea-sepolia.g.alchemy.com/public"